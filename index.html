<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <h1 id="title">📝 To-Do List</h1>

        <input
            type="text"
            id="taskInput"
            placeholder="Add a new task..."
            autocomplete="off"
        >

        <button type="button" id="addBtn">Add Task</button>

        <p id="message"></p>

        <div class="stats">
            <p>Total Tasks: <span id="taskCount">0</span></p>
            <p>Completed Tasks: <span id="completedCount">0</span></p>
        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
